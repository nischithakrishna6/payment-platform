spring.application.name=fintech-platform

# ------------------------------
# Database Configuration
# ------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP (FIXED for Supabase)
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.keepalive-time=10000

# ------------------------------
# JPA / Hibernate Configuration
# ------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ------------------------------
# JWT Configuration (FIXED)
# ------------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# ------------------------------
# Server Configuration
# ------------------------------
server.port=${PORT:8081}
server.address=0.0.0.0
server.error.include-message=always

# ------------------------------
# Logging
# ------------------------------
logging.level.com.fintech=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=ERROR
logging.level.org.springframework.web.socket.sockjs=ERROR  

# ------------------------------
# Email Configuration
# ------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

app.mail.from=${SPRING_MAIL_USERNAME}
app.name=NexaVault

# ------------------------------
# Actuator
# ------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false
management.health.db.enabled=false
management.health.defaults.enabled=false
management.health.ping.enabled=true
