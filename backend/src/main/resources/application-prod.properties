spring.application.name=fintech-platform

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationPleaseChangeThisInProduction256Bits}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Server Configuration
server.port=${PORT:10000}
server.error.include-message=always

# Logging
logging.level.com.fintech=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=ERROR

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# Application Email
app.mail.from=${SPRING_MAIL_USERNAME:noreply@example.com}
app.name=NexaVault

# Actuator - Simple health check only
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false
management.health.db.enabled=true

# CORS
cors.allowed.origins=https://nexavault-frontend.onrender.com